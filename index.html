<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>永远怀念 · 朱雪梅</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "Noto Serif SC", "Songti SC", "Georgia", serif;
    background: #f5f0e8;
    color: #3d3631;
    min-height: 100vh;
  }

  /* === Hero === */
  .hero {
    background: linear-gradient(180deg, #1a1a1a 0%, #3a3530 50%, #5a5248 100%);
    color: #e8ddd0;
    text-align: center;
    padding: 90px 20px 70px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 50% 30%, rgba(210,190,165,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 50% 80%, rgba(210,190,165,0.04) 0%, transparent 50%);
  }
  .hero::after {
    content: "";
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Ccircle cx='30' cy='30' r='1'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .hero-inner { position: relative; z-index: 1; max-width: 700px; margin: 0 auto; }

  .hero-ornament {
    font-size: 28px;
    margin-bottom: 18px;
    opacity: 0.35;
    letter-spacing: 10px;
  }

  .hero h1 {
    font-size: 46px;
    font-weight: 400;
    letter-spacing: 14px;
    margin-bottom: 8px;
    color: #f0e4d0;
    text-shadow: 0 2px 30px rgba(0,0,0,0.4);
  }
  .hero .subtitle {
    font-size: 15px;
    color: #b8a898;
    letter-spacing: 10px;
    margin-bottom: 28px;
    font-weight: 300;
  }
  .hero .years {
    font-size: 18px;
    color: #c8b8a5;
    letter-spacing: 4px;
    border-top: 1px solid rgba(200,184,165,0.2);
    border-bottom: 1px solid rgba(200,184,165,0.2);
    display: inline-block;
    padding: 6px 20px;
    font-weight: 300;
  }
  .hero-candle {
    font-size: 24px;
    margin-top: 28px;
    opacity: 0.4;
    animation: flicker 3s ease-in-out infinite;
  }
  @keyframes flicker {
    0%, 100% { opacity: 0.35; transform: scale(1); }
    25% { opacity: 0.55; transform: scale(1.04); }
    50% { opacity: 0.3; transform: scale(0.98); }
    75% { opacity: 0.5; transform: scale(1.02); }
  }

  /* === Memorial message === */
  .message-wrap {
    max-width: 640px;
    margin: 0 auto;
    padding: 56px 24px 40px;
  }
  .message-wrap p {
    font-size: 17px;
    line-height: 2.1;
    color: #555;
    margin-bottom: 18px;
    text-align: center;
  }
  .message-wrap .name-tag {
    text-align: center;
    font-size: 20px;
    color: #8a7a6a;
    letter-spacing: 6px;
    margin-bottom: 30px;
  }
  .message-wrap .signature {
    text-align: right;
    margin-top: 32px;
    font-size: 15px;
    color: #999;
    font-style: italic;
  }

  .divider {
    text-align: center;
    color: #d5cdc0;
    font-size: 22px;
    margin: 0 auto 8px;
    letter-spacing: 16px;
    opacity: 0.5;
  }

  /* === Gallery === */
  .gallery-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 16px 20px;
  }
  .gallery-title {
    text-align: center;
    font-size: 16px;
    color: #b5a898;
    letter-spacing: 8px;
    margin-bottom: 32px;
    font-weight: 400;
  }

  .gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
    padding-bottom: 40px;
  }

  .gallery-item {
    position: relative;
    overflow: hidden;
    border-radius: 4px;
    background: #e8e0d5;
    aspect-ratio: 4/3;
    cursor: pointer;
    opacity: 0;
    transform: translateY(30px);
    transition: transform 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
                box-shadow 0.4s ease;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .gallery-item.visible {
    opacity: 1;
    transform: translateY(0);
  }
  .gallery-item:hover {
    box-shadow: 0 8px 30px rgba(0,0,0,0.15);
    z-index: 2;
  }
  .gallery-item img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
  }
  .gallery-item:hover img {
    transform: scale(1.08);
  }

  /* === Lightbox === */
  .lightbox {
    display: none;
    position: fixed;
    z-index: 1000;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: center;
    padding: 30px;
    backdrop-filter: blur(6px);
  }
  .lightbox.active {
    display: flex;
    animation: fadeIn 0.3s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .lightbox img {
    max-width: 92vw;
    max-height: 88vh;
    object-fit: contain;
    border-radius: 3px;
    box-shadow: 0 12px 60px rgba(0,0,0,0.6);
    animation: zoomIn 0.3s ease;
  }
  @keyframes zoomIn {
    from { transform: scale(0.92); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .lightbox .close {
    position: absolute;
    top: 16px;
    right: 20px;
    color: rgba(255,255,255,0.5);
    font-size: 32px;
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
    transition: color 0.2s, transform 0.2s;
    z-index: 10;
  }
  .lightbox .close:hover { color: #fff; transform: rotate(90deg); }

  .lightbox .nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 44px;
    cursor: pointer;
    background: none;
    border: none;
    padding: 12px 18px;
    transition: color 0.2s, opacity 0.2s;
    z-index: 10;
    opacity: 0;
  }
  .lightbox:hover .nav { opacity: 1; }
  .lightbox .nav:hover { color: #fff; opacity: 1 !important; }
  .lightbox .prev { left: 8px; }
  .lightbox .next { right: 8px; }

  .lightbox .counter {
    position: absolute;
    bottom: 20px;
    color: rgba(255,255,255,0.35);
    font-size: 13px;
    letter-spacing: 2px;
    z-index: 10;
  }

  /* === Footer === */
  .footer {
    text-align: center;
    padding: 10px 20px 50px;
    color: #c8bdb0;
    font-size: 13px;
    letter-spacing: 4px;
  }

  /* === Scrollbar === */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #f5f0e8; }
  ::-webkit-scrollbar-thumb { background: #d5cdc0; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #b5a898; }

  @media (max-width: 600px) {
    .hero { padding: 60px 16px 50px; }
    .hero h1 { font-size: 32px; letter-spacing: 8px; }
    .hero .subtitle { font-size: 13px; letter-spacing: 6px; }
    .hero .years { font-size: 15px; }
    .message-wrap { padding: 36px 16px 24px; }
    .message-wrap p { font-size: 15px; line-height: 1.9; }
    .gallery { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
    .lightbox { padding: 12px; }
    .lightbox .nav { opacity: 0.6; font-size: 32px; padding: 8px 10px; }
    .lightbox .nav.prev { left: 2px; }
    .lightbox .nav.next { right: 2px; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-ornament">✺</div>
    <h1>朱雪梅</h1>
    <div class="subtitle">永 远 怀 念</div>
    <div class="years">1955 — 2023</div>
    <div class="hero-candle">🕯</div>
  </div>
</div>

<div class="message-wrap">
  <div class="name-tag">— 致亲爱的姑姑 —</div>

  <p>
    您就这样悄悄地走了，<br>
    留下我们无尽的思念。
  </p>

  <p>
    想起您的笑容，温暖如春；<br>
    想起您的声音，亲切如昔。<br>
    您的善良、您的温柔、您对这个家付出的点点滴滴，<br>
    我们都一一记在心里，永远不会忘记。
  </p>

  <p>
    每一张照片，都是一段珍贵的回忆；<br>
    每一次翻看，仿佛您从未走远。
  </p>

  <p>
    愿天堂没有病痛，<br>
    愿您在另一个世界安好。<br>
    我们永远想念您，永远爱您。
  </p>

  <div class="signature">—— 家人泣挽</div>
</div>

<div class="divider">✽ ✽ ✽</div>

<div class="gallery-wrap">
  <h2 class="gallery-title">珍 贵 回 忆</h2>
  <div class="gallery" id="gallery"></div>
</div>

<div class="footer">永远怀念 · 2026</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
  <button class="close" onclick="closeLightbox()" aria-label="关闭">✕</button>
  <button class="nav prev" onclick="changeImage(-1)" aria-label="上一张">‹</button>
  <img id="lightbox-img" src="" alt="">
  <button class="nav next" onclick="changeImage(1)" aria-label="下一张">›</button>
  <div class="counter" id="lightbox-counter"></div>
</div>

<script>
const photos = [
  "DSC_0014.JPG", "DSC_0017.JPG", "DSC_0019.JPG", "DSC_0021.JPG", "DSC_0045.JPG", "DSC_0046.JPG",
  "DSC_0079.JPG", "DSC_0114.JPG", "IMG_0193.JPG", "IMG_3764.JPG", "IMG_3773.JPG", "IMG_3774.JPG",
  "IMG_3840.JPG", "IMG_6032.JPG", "IMG_6033.JPG", "IMG_6038.JPG", "IMG_6040.JPG", "IMG_6057.JPG",
  "IMG_6064.JPG", "IMG_6074.JPG", "IMG_6075.JPG", "IMG_6076.JPG", "IMG_6077.JPG", "IMG_6095.JPG",
  "IMG_6103.JPG", "IMG_6116.JPG", "IMG_6120.JPG", "IMG_6121.JPG", "IMG_6124.JPG", "IMG_6125.JPG",
  "IMG_8058.JPG", "IMG_8058_1.JPG", "P5310009.JPG", "P9290005.JPG", "P9290014.JPG", "P9290015.JPG",
  "P9290016.JPG", "P9300003.JPG", "P9300006.JPG", "P9300010.JPG", "P9300014.JPG", "P9300015.JPG",
  "P9300016.JPG", "PA010013.JPG", "PA010016.JPG", "PIC_2336.JPG", "_DSC8873.JPG", "_DSC8874.JPG",
  "pic 022.JPG", "pic 025.JPG", "pic 026.JPG", "pic 031.JPG", "pic 032.JPG", "pic 035.JPG",
  "pic 036.JPG", "pic 037.JPG", "pic 041.JPG", "pic 051.JPG", "pic 052.JPG", "微信图片_20230906084724.jpg",
  "微信图片_20231101104734.jpg", "微信图片_20231102082608.jpg", "微信图片_20231102082652.jpg", "微信图片_20231102093903.jpg", "微信图片_20231102093920.jpg", "微信图片_20231102093925.jpg",
  "微信图片_20231102093933.jpg", "微信图片_20231102093939.jpg", "微信图片_20231102133107.jpg", "微信图片_20231106081217.jpg", "微信图片_20231106081226.jpg", "微信图片_20231106082348.jpg",
  "微信图片_20231106082349.jpg", "微信图片_20231107075018.jpg", "微信图片_20231107091426.jpg", "微信图片_20231113075536.jpg", "微信图片_20231113075542.jpg", "微信图片_20231113105027.jpg",
  "微信图片_20231113143616.jpg", "微信图片_20231113150511.jpg", "微信图片_20231113151322.jpg", "微信图片_202311132205101.jpg", "微信图片_202311132209291.jpg", "微信图片_202311132210511.jpg",
  "微信图片_202311132210513.jpg", "微信图片_20231113221059.jpg", "微信图片_202311182105591.jpg", "照片 003.jpg", "照片 004.jpg", "照片 005.jpg",
  "照片 007.jpg", "照片 023.jpg"
];

const gallery = document.getElementById('gallery');
let currentIndex = 0;

// Render gallery
photos.forEach((name, i) => {
  const div = document.createElement('div');
  div.className = 'gallery-item';
  const img = document.createElement('img');
  img.loading = 'lazy';
  img.src = encodeURI(name);
  img.alt = '';
  div.appendChild(img);
  div.addEventListener('click', () => openLightbox(i));
  gallery.appendChild(div);
});

// Scroll-triggered fade-in
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    }
  });
}, { threshold: 0.1, rootMargin: '0px 0px 50px 0px' });

document.querySelectorAll('.gallery-item').forEach(el => observer.observe(el));

// Lightbox
const lb = document.getElementById('lightbox');
const lbImg = document.getElementById('lightbox-img');
const lbCounter = document.getElementById('lightbox-counter');

function openLightbox(idx) {
  currentIndex = idx;
  lbImg.src = encodeURI(photos[idx]);
  lbCounter.textContent = (idx + 1) + ' / ' + photos.length;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  lb.classList.remove('active');
  document.body.style.overflow = '';
}
function changeImage(dir) {
  currentIndex = (currentIndex + dir + photos.length) % photos.length;
  lbImg.style.animation = 'none';
  lbImg.offsetHeight; // trigger reflow
  lbImg.src = encodeURI(photos[currentIndex]);
  lbImg.style.animation = 'zoomIn 0.25s ease';
  lbCounter.textContent = (currentIndex + 1) + ' / ' + photos.length;
}

document.addEventListener('keydown', e => {
  if (!lb.classList.contains('active')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') changeImage(-1);
  if (e.key === 'ArrowRight') changeImage(1);
});

// Click backdrop to close
lb.addEventListener('click', e => {
  if (e.target === lb) closeLightbox();
});
</script>

</body>
</html>
